<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGMHSS Patteeswaram - Exam Results</title>
  <style>
    :root { 
      --primary: #2563eb; 
      --primary-hover: #1d4ed8;
      --accent: #f59e0b; 
      --bg-light: #f8fafc; 
      --card-bg: #ffffff; 
      --text-main: #1e293b; 
      --text-muted: #64748b;
      --border-color: #e2e8f0;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      min-height: 100vh; 
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
      background: var(--bg-light); 
      color: var(--text-main); 
      display: flex; 
      align-items: flex-start; 
      justify-content: center; 
      padding: 30px 16px; 
    }
    
    .container { 
      max-width: 1000px; 
      width: 100%; 
      background: var(--card-bg); 
      border-radius: 20px; 
      padding: 24px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.06); 
      border: 1px solid var(--border-color);
      position: relative; 
      overflow: hidden; 
    }
    
    h1 { 
      font-size: clamp(1.4rem, 3vw, 2rem); 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      color: #0f172a; 
      margin-bottom: 20px;
      font-weight: 700;
    }
    
    h1 span.logo { 
      width: 42px; 
      height: 42px; 
      border-radius: 50%; 
      background: linear-gradient(135deg, #fde68a, #f59e0b); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 22px; 
      box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); 
      flex-shrink: 0;
      color: #fff;
    }
    
    .card { 
      background: #f1f5f9; 
      border-radius: 16px; 
      padding: 20px; 
      border: 1px solid var(--border-color); 
      margin-bottom: 20px; 
    }
    
    .form-grid { 
      display: grid; 
      grid-template-columns: 1fr 2fr 1fr; 
      gap: 16px; 
      align-items: end; 
      margin-top: 12px; 
    }
    
    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    
    input[type=text] { 
      width: 100%; 
      padding: 12px 16px; 
      border-radius: 10px; 
      border: 2px solid #cbd5e1; 
      background: #ffffff; 
      color: var(--text-main); 
      outline: none; 
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    
    input:focus { 
      border-color: var(--primary); 
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); 
    }
    
    .exam-options { display: flex; flex-wrap: wrap; gap: 8px; }
    
    .exam-pill { 
      padding: 8px 14px; 
      border-radius: 8px; 
      background: #ffffff; 
      border: 1px solid #cbd5e1; 
      cursor: pointer; 
      font-size: 0.9rem; 
      display: inline-flex; 
      align-items: center; 
      gap: 8px; 
      color: #334155;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .exam-pill:hover { border-color: var(--primary); background: #eff6ff; }
    
    button { 
      background: var(--primary); 
      color: #ffffff; 
      padding: 12px 20px; 
      border: none; 
      border-radius: 10px; 
      font-size: 1rem;
      font-weight: 600; 
      cursor: pointer; 
      width: 100%; 
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
    }
    
    button:hover { background: var(--primary-hover); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    
    #status { margin-top: 12px; color: #d97706; font-weight: 600; font-size: 0.95rem; min-height: 1.4em; }
    
    /* --- LIGHT DISPLAY PANEL --- */
    .result-card { 
      background: #ffffff; 
      border-radius: 16px; 
      padding: 24px; 
      border: 1px solid var(--border-color); 
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
      overflow-x: auto;
    }
    
    .result-card h2 {
      color: #0f172a;
      margin-bottom: 16px;
      font-size: 1.4rem;
    }
    
    .student-meta { 
      background: #f8fafc; 
      padding: 16px; 
      border-radius: 12px; 
      margin-bottom: 20px; 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
      gap: 12px; 
      font-size: 1rem; 
      border: 1px solid var(--border-color);
      color: #334155;
    }
    
    .student-meta strong { color: var(--primary); font-weight: 700; } 
    
    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 10px; 
      font-size: 0.95rem; 
      background: #ffffff; 
      border-radius: 12px; 
      overflow: hidden; 
      border: 1px solid var(--border-color); 
    }
    
    thead { 
      background: linear-gradient(90deg, var(--primary), #0ea5e9); 
      color: #ffffff; 
    }
    
    th, td { padding: 14px 16px; text-align: center; border-bottom: 1px solid #f1f5f9; }
    th:first-child, td:first-child { text-align: left; font-weight: 600; }
    
    tbody tr:nth-child(even) { background: #f8fafc; }
    tbody tr:hover { background: #f1f5f9; }
    
    .total-row td { 
      background: #eff6ff !important; 
      font-weight: 700; 
      color: #1e3a8a; 
      border-top: 2px solid #bfdbfe;
      border-bottom: none;
    }
    
    .result-pass { color: #16a34a; font-weight: 700; } /* Green */
    .result-fail { color: #dc2626; font-weight: 700; } /* Red */
    .result-pending { color: #94a3b8; font-style: italic; }
    
    @media (max-width: 840px) { 
      .form-grid { grid-template-columns: 1fr; gap: 12px; } 
      .container { padding: 16px; border-radius: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="logo">★</span> AGMHSS Patteeswaram Results</h1>
    <div class="card">
      <div style="margin-bottom:12px; color: #475569;">
        Enter your <strong>EMIS Number</strong> to fetch results
      </div>
      <div class="form-grid">
        <div>
          <label>EMIS Number</label>
          <input id="examNoInput" type="text" placeholder="e.g. 3317..." />
        </div>
        <div>
          <label>Select Exams</label>
          <div id="examOptions" class="exam-options">Loading database...</div>
        </div>
        <div>
          <button id="showBtn">Show Results</button>
        </div>
      </div>
      <div id="status"></div>
    </div>
    
    <div id="resultArea" style="display:none;" class="result-card">
      <h2>Marks Comparison <small id="examLabels" style="font-size: 0.6em; color: #64748b; font-weight: 500;"></small></h2>
      <div class="student-meta">
        <span><strong>Name:</strong> <span id="sName">—</span></span>
        <span><strong>EMIS No:</strong> <span id="sEXAMNO">—</span></span>
        <span><strong>Class & Sec:</strong> <span id="sClass">—</span></span>
      </div>
      <div id="tableWrapper"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = "1RkGzPu3KkP5FRZqPMgmIYVbu2--y-NobJMpbNo-GgIc";
    const MARKS_SHEET = "Marks";
    const INFO_SHEET = "Sheet2"; 
    const EXAM_NAMES = ["I Mid-Term", "Quarterly", "II Mid-Term", "Half-Yearly", "Annual"];

    let exams = [];
    let sheetRows = [];
    let studentInfoMap = {}; 
    
    const status = document.getElementById("status");
    const examOptions = document.getElementById("examOptions");

    function cleanID(id) {
      if (id == null) return "";
      return String(id).replace(/\.0$/, '').replace(/\s+/g, '').trim();
    }

    async function loadData() {
      status.textContent = "Connecting to database...";
      try {
        const marksUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(MARKS_SHEET)}`;
        const infoUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(INFO_SHEET)}`;
        
        const [marksResp, infoResp] = await Promise.all([fetch(marksUrl), fetch(infoUrl)]);
        
        if (!marksResp.ok || !infoResp.ok) throw new Error("Network error fetching sheets");
        
        const marksData = await parseGvizResponse(marksResp);
        const infoData = await parseGvizResponse(infoResp);

        processStudentInfo(infoData); 
        processMarks(marksData);      
        
      } catch (err) {
        console.error(err);
        status.textContent = "Failed to load data. Ensure Sheet2 exists and document is Published to Web.";
        examOptions.innerHTML = "Error loading sheets";
      }
    }

    async function parseGvizResponse(response) {
      let text = await response.text();
      const jsonStart = text.indexOf("{");
      const jsonEnd = text.lastIndexOf("}") + 1;
      return JSON.parse(text.substring(jsonStart, jsonEnd));
    }

    function processStudentInfo(data) {
      studentInfoMap = {};
      const headers = data.table.cols.map(c => (c?.label || "").toLowerCase().replace(/[^a-z]/g, ''));
      const firstRow = data.table.rows[0] ? data.table.rows[0].c.map(cell => String(cell?.v || "").toLowerCase().replace(/[^a-z]/g, '')) : [];

      let emisCol = -1, nameCol = -1, classCol = -1, secCol = -1;

      for(let i = 0; i < Math.max(headers.length, firstRow.length); i++) {
        const h = headers[i] || "";
        const f = firstRow[i] || "";
        if (emisCol === -1 && (h.includes("emis") || h.includes("examno") || f.includes("emis"))) emisCol = i;
        if (nameCol === -1 && (h.includes("name") || f.includes("name"))) nameCol = i;
        if (classCol === -1 && (h === "class" || h.includes("std") || f === "class")) classCol = i;
        if (secCol === -1 && (h === "sec" || h.includes("section") || f === "sec" || f === "section")) secCol = i;
      }

      if (emisCol === -1) emisCol = 0;
      if (nameCol === -1) nameCol = emisCol + 1;
      if (classCol === -1) classCol = emisCol + 2;

      const rows = data.table.rows.map(r => r.c.map(cell => cell?.v ?? null));

      rows.forEach(row => {
        let emis = cleanID(row[emisCol]);
        if (!emis && emisCol === 0 && row.length > 1) emis = cleanID(row[1]); 

        if (emis && emis !== "null") {
          let className = classCol !== -1 ? String(row[classCol] || "").trim() : "";
          let sectionName = secCol !== -1 ? String(row[secCol] || "").trim() : "";
          
          let fullClassSec = className;
          if (sectionName && className !== sectionName) {
             fullClassSec += " - " + sectionName;
          } else if (!className && sectionName) {
             fullClassSec = sectionName;
          }

          studentInfoMap[emis] = {
            name: row[nameCol] || "Name missing in sheet",
            classSec: fullClassSec || "—"
          };
        }
      });
    }

    function processMarks(data) {
      const headers = data.table.cols.map(c => (c?.label || c?.id || "").trim()).filter(h => h);
      sheetRows = data.table.rows.map(r => r.c.map(cell => cell?.v ?? null));

      if (sheetRows.length === 0) throw new Error("Marks sheet is empty");
      
      detectExamBlocks(headers);
    }

    function detectExamBlocks(headers) {
      exams = [];
      let blockId = 0;

      let currentBlock = {
        label: EXAM_NAMES[blockId] || `Exam ${blockId + 1}`,
        totalCol: null,
        resultCol: null,
        subjects: [],
        EXAMNOCol: -1
      };

      for (let c = 0; c < headers.length; c++) {
        const hLower = (headers[c] || "").toLowerCase().trim();
        const hAlpha = hLower.replace(/[^a-z]/g, '');

        if (["emis", "examno", "roll"].some(x => hAlpha.includes(x))) {
            currentBlock.EXAMNOCol = c;
        }

        if (["rank", "sno", "slno", "emis", "examno", "name", "class", "sec", "roll"].some(x => hAlpha.includes(x))) {
          continue;
        }

        if (hLower.includes("total")) {
          currentBlock.totalCol = c;
          if (currentBlock.EXAMNOCol === -1 && exams.length > 0) {
              currentBlock.EXAMNOCol = exams[0].EXAMNOCol;
          }
          exams.push(currentBlock);
          blockId++;
          
          currentBlock = {
            label: EXAM_NAMES[blockId] || `Exam ${blockId + 1}`,
            totalCol: null,
            resultCol: null,
            subjects: [],
            EXAMNOCol: -1
          };
        } 
        // More robust checking to find the Result column
        else if (hLower.includes("result") || hLower === "status") {
           if (exams.length > 0 && currentBlock.subjects.length === 0) {
              exams[exams.length - 1].resultCol = c; 
           } else {
              currentBlock.resultCol = c;
           }
        }
        else if (headers[c]) {
          currentBlock.subjects.push({ name: headers[c], col: c });
        }
      }

      if (currentBlock.subjects.length > 0) {
        if (currentBlock.EXAMNOCol === -1 && exams.length > 0) currentBlock.EXAMNOCol = exams[0].EXAMNOCol;
        exams.push(currentBlock);
      }

      if (exams.length === 0) {
        status.textContent = "No exams detected. Check your column headers.";
        examOptions.innerHTML = "No exams found";
        return;
      }

      renderExamCheckboxes();
      status.textContent = ``;
    }

    function renderExamCheckboxes() {
      examOptions.innerHTML = "";
      exams.forEach((exam, idx) => {
        const lbl = document.createElement("label");
        lbl.className = "exam-pill";
        lbl.innerHTML = `<input type="checkbox" value="${idx}" checked> <span>${exam.label}</span>`;
        examOptions.appendChild(lbl);
      });
    }

    document.getElementById("showBtn").onclick = showResults;
    document.getElementById("examNoInput").addEventListener("keypress", e => {
      if (e.key === "Enter") showResults();
    });

    function extractClassNumber(clsString) {
      const str = String(clsString).toUpperCase();
      if (str.includes("9") || str.includes("IX")) return 9;
      if (str.includes("8") || str.includes("VIII")) return 8;
      if (str.includes("7") || str.includes("VII")) return 7;
      if (str.includes("6") || str.includes("VI")) return 6;
      return 0; 
    }

    function showResults() {
      const examNo = cleanID(document.getElementById("examNoInput").value);
      if (!examNo) {
        status.textContent = "Enter EMIS Number";
        return;
      }

      const selected = Array.from(examOptions.querySelectorAll("input:checked")).map(cb => parseInt(cb.value));

      if (selected.length === 0) {
        status.textContent = "Select at least one exam";
        return;
      }

      const results = [];
      
      selected.forEach(idx => {
        const exam = exams[idx];
        
        const row = sheetRows.find(r => {
          let rowHasMatchingEmis = exams.some(e => {
            if (e.EXAMNOCol === -1) return false;
            let cellVal = cleanID(r[e.EXAMNOCol]);
            return cellVal === examNo || (cellVal.length >= 8 && examNo.endsWith(cellVal));
          });
          
          if (rowHasMatchingEmis) return true;

          return [0, 1, 2, 3].some(colIdx => {
             let colVal = cleanID(r[colIdx]);
             return colVal === examNo || (colVal.length >= 8 && examNo.endsWith(colVal));
          });
        });

        if (row) {
          const marks = {};
          exam.subjects.forEach(s => { marks[s.name] = row[s.col] ?? "-"; });
          results.push({ 
            exam: exam.label, 
            total: exam.totalCol !== null ? (row[exam.totalCol] ?? "-") : "-", 
            manualResult: exam.resultCol !== null ? (row[exam.resultCol] ?? "") : "", 
            marks 
          });
        } else {
          results.push({ exam: exam.label, total: "-", manualResult: "", marks: {} });
        }
      });

      if (results.every(r => r.total === "-")) {
        status.textContent = "EMIS number not found in selected exams";
        document.getElementById("resultArea").style.display = "none";
        return;
      }

      renderTable(examNo, results);
      document.getElementById("resultArea").style.display = "block";
      status.textContent = "";
    }

    function renderTable(examno, results) {
      const studentData = studentInfoMap[examno] || { name: "Name not found in Sheet2", classSec: "—" };
      const classNum = extractClassNumber(studentData.classSec);
      const isRTE = (classNum >= 6 && classNum <= 8);
      
      const allSubjects = new Set();
      results.forEach(r => Object.keys(r.marks).forEach(s => allSubjects.add(s)));
      let subjects = Array.from(allSubjects);

      subjects.sort((a, b) => {
        const aIsTamil = a.toLowerCase().includes("tamil");
        const bIsTamil = b.toLowerCase().includes("tamil");
        if (aIsTamil && !bIsTamil) return -1;
        if (!aIsTamil && bIsTamil) return 1;
        return a.localeCompare(b);
      });

      let html = `<table><thead><tr><th>Subject</th>`;
      results.forEach(r => {
        html += `<th>${r.exam}</th>`;
        if (r.exam.toLowerCase().includes("annual")) html += `<th>Result</th>`; 
      });
      html += `</tr></thead><tbody>`;

      subjects.forEach(sub => {
        html += `<tr><td style="font-weight:600; color: #334155;">${sub}</td>`;
        results.forEach(r => {
          const mark = r.marks[sub] ?? "-";
          html += `<td>${mark}</td>`;
          if (r.exam.toLowerCase().includes("annual")) html += `<td>-</td>`; 
        });
        html += `</tr>`;
      });

      html += `<tr class="total-row"><td>TOTAL</td>`;
      results.forEach(r => {
        html += `<td>${r.total}</td>`;
        
        if (r.exam.toLowerCase().includes("annual")) {
          let finalStatus = "—";
          let statusClass = "result-pending";
          
          if (r.total !== "-") { 
            let manual = String(r.manualResult).trim();
            
            // Priority 1: Check what you manually typed in the Result column
            if (manual && manual.toLowerCase() !== "null" && manual !== "-") {
              finalStatus = manual; // Uses your exact text (e.g. "Passed", "Failed")
              
              let manualUpper = manual.toUpperCase();
              if (manualUpper.includes("PASS")) {
                 statusClass = "result-pass";
              } else if (manualUpper.includes("FAIL") || manualUpper.includes("DETAIN")) {
                 statusClass = "result-fail";
              } else {
                 statusClass = "result-pending"; 
              }
            } 
            // Priority 2: If manual column is empty, fallback to Auto-Pass for 6-8
            else if (isRTE) {
              finalStatus = "PASS (RTE)";
              statusClass = "result-pass";
            }
          }
          html += `<td class="${statusClass}">${finalStatus}</td>`;
        }
      });
      html += `</tr></tbody></table>`;

      document.getElementById("sName").textContent = studentData.name;
      document.getElementById("sEXAMNO").textContent = examno;
      document.getElementById("sClass").textContent = studentData.classSec;
      document.getElementById("examLabels").textContent = `(${results.map(r => r.exam).join(" / ")})`;
      document.getElementById("tableWrapper").innerHTML = html;
    }

    loadData();
  </script>
</body>
  </html>
