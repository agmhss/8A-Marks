<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AGMHSS Patteeswaram - Exam Results</title>
  <style>
    :root { --primary:#2563eb; --accent:#f97316; --bg-dark:#020617; --card-bg:rgba(15,23,42,0.96); --text-main:#e5e7eb; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { min-height:100vh; font-family:system-ui,sans-serif; background:radial-gradient(circle at top,#1d4ed8 0,#020617 45%,#020617 100%); color:var(--text-main); display:flex; align-items:center; justify-content:center; padding:16px; }
    .container { max-width:1000px; width:100%; background:linear-gradient(135deg,rgba(15,23,42,0.98),rgba(8,47,73,0.98)); border-radius:24px; padding:20px; box-shadow:0 24px 70px rgba(0,0,0,0.6); position:relative; overflow:hidden; }
    h1 { font-size:clamp(1.4rem,3vw,2rem); display:flex; align-items:center; gap:10px; color:#f9fafb; margin-bottom: 15px;}
    h1 span.logo { width:42px; height:42px; border-radius:50%; background:radial-gradient(#fde68a,#f97316); display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 0 22px rgba(251,191,36,0.8); flex-shrink: 0;}
    .card { background:var(--card-bg); border-radius:18px; padding:16px; border:1px solid rgba(148,163,184,0.4); margin-bottom:16px; }
    .form-grid { display:grid; grid-template-columns:1fr 2fr 1fr; gap:12px; align-items:end; margin-top:12px; }
    input[type=text] { width:100%; padding:10px 14px; border-radius:999px; border:1px solid rgba(148,163,184,0.7); background:rgba(15,23,42,0.94); color:#e5e7eb; outline:none; }
    input:focus { border-color:#4ade80; box-shadow:0 0 0 2px rgba(74,222,128,0.3); }
    .exam-options { display:flex; flex-wrap:wrap; gap:8px; }
    .exam-pill { padding:6px 12px; border-radius:999px; background:rgba(15,23,42,0.9); border:1px solid rgba(148,163,184,0.6); cursor:pointer; font-size:0.85rem; display:inline-flex; align-items:center; gap:6px; }
    .exam-pill:hover { border-color:#fbbf24; }
    button { background:linear-gradient(135deg,#f97316,#facc15); color:#111; padding:12px; border:none; border-radius:999px; font-weight:600; cursor:pointer; width:100%; }
    #status { margin-top:10px; color:#facc15; font-size:0.9rem; min-height:1.4em; }
    .result-card { background:var(--card-bg); border-radius:16px; padding:16px; border:1px solid rgba(148,163,184,0.4); overflow-x: auto;}
    .student-meta { background:rgba(15,23,42,0.6); padding:12px; border-radius:10px; margin-bottom:12px; display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:8px; font-size:0.92rem; }
    .student-meta strong { color:#facc15; }
    table { width:100%; border-collapse:collapse; margin-top:10px; font-size:0.88rem; background:rgba(15,23,42,0.98); border-radius:12px; overflow:hidden; }
    thead { background:linear-gradient(90deg,#0ea5e9,#22c55e); color:#fff; }
    th, td { padding:10px; text-align:center; }
    th:first-child, td:first-child { text-align:left; font-weight:600; }
    tbody tr:nth-child(even) { background:rgba(15,23,42,0.96); }
    .total-row td { background:rgba(30,64,175,0.9)!important; font-weight:700; color:#fbbf24; }
    .result-pass { color: #4ade80; font-weight: bold; }
    .result-fail { color: #f87171; font-weight: bold; }
    .result-pending { color: #94a3b8; font-style: italic; }
    @media (max-width:840px) { .form-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="logo">★</span> AGMHSS Patteeswaram Results</h1>
    <div class="card">
      <div style="margin-bottom:12px; color:#cbd5f5;">
        Enter your <strong style="color:#facc15;">EMIS Number</strong> and select Exams
      </div>
      <div class="form-grid">
        <div>
          <label>EMIS Number</label>
          <input id="examNoInput" type="text" placeholder="e.g. 3317..." />
        </div>
        <div>
          <label>Select Exams</label>
          <div id="examOptions" class="exam-options">Loading database...</div>
        </div>
        <div>
          <button id="showBtn">Show Results</button>
        </div>
      </div>
      <div id="status"></div>
    </div>
    
    <div id="resultArea" style="display:none;" class="result-card">
      <h2>Marks Comparison <small id="examLabels" style="font-size: 0.6em; color: #94a3b8;"></small></h2>
      <div class="student-meta">
        <span><strong>Name:</strong> <span id="sName">—</span></span>
        <span><strong>EMIS No:</strong> <span id="sEXAMNO">—</span></span>
        <span><strong>Class & Sec:</strong> <span id="sClass">—</span></span>
      </div>
      <div id="tableWrapper"></div>
    </div>
  </div>

  <script>
    const SHEET_ID = "1RkGzPu3KkP5FRZqPMgmIYVbu2--y-NobJMpbNo-GgIc";
    const MARKS_SHEET = "Marks";
    const INFO_SHEET = "Sheet2"; 
    const EXAM_NAMES = ["I Mid-Term", "Quarterly", "II Mid-Term", "Half-Yearly", "Annual"];

    let exams = [];
    let sheetRows = [];
    let studentInfoMap = {}; 
    
    const status = document.getElementById("status");
    const examOptions = document.getElementById("examOptions");

    // Helper: Cleans invisible decimals (.0) and spaces from ID numbers
    function cleanID(id) {
      if (id == null) return "";
      return String(id).replace(/\.0$/, '').trim();
    }

    async function loadData() {
      status.textContent = "Connecting to database...";
      try {
        const marksUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(MARKS_SHEET)}`;
        const infoUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(INFO_SHEET)}`;
        
        const [marksResp, infoResp] = await Promise.all([fetch(marksUrl), fetch(infoUrl)]);
        
        if (!marksResp.ok || !infoResp.ok) throw new Error("Network error fetching sheets");
        
        const marksData = await parseGvizResponse(marksResp);
        const infoData = await parseGvizResponse(infoResp);

        processStudentInfo(infoData); 
        processMarks(marksData);      
        
      } catch (err) {
        console.error(err);
        status.textContent = "Failed to load data. Ensure Sheet2 exists and document is Published to Web.";
        examOptions.innerHTML = "Error loading sheets";
      }
    }

    async function parseGvizResponse(response) {
      let text = await response.text();
      const jsonStart = text.indexOf("{");
      const jsonEnd = text.lastIndexOf("}") + 1;
      return JSON.parse(text.substring(jsonStart, jsonEnd));
    }

    function processStudentInfo(data) {
      studentInfoMap = {};
      const headers = data.table.cols.map(c => (c?.label || "").toLowerCase().replace(/[^a-z]/g, ''));
      
      // Fallback: If headers are empty, scan the first row of actual data
      const firstRow = data.table.rows[0] ? data.table.rows[0].c.map(cell => String(cell?.v || "").toLowerCase().replace(/[^a-z]/g, '')) : [];

      let emisCol = -1, nameCol = -1, classCol = -1;

      // Smart Column Detection
      for(let i=0; i < Math.max(headers.length, firstRow.length); i++) {
        const h = headers[i] || "";
        const f = firstRow[i] || "";
        if (emisCol === -1 && (h.includes("emis") || h.includes("examno") || f.includes("emis"))) emisCol = i;
        if (nameCol === -1 && (h.includes("name") || f.includes("name"))) nameCol = i;
        if (classCol === -1 && (h.includes("class") || h.includes("sec") || f.includes("class"))) classCol = i;
      }

      // Default to columns 0, 1, 2 if names are completely unrecognized
      if (emisCol === -1) emisCol = 0;
      if (nameCol === -1) nameCol = emisCol + 1;
      if (classCol === -1) classCol = emisCol + 2;

      const rows = data.table.rows.map(r => r.c.map(cell => cell?.v ?? null));

      rows.forEach(row => {
        const emis = cleanID(row[emisCol]);
        if (emis && emis !== "null") {
          studentInfoMap[emis] = {
            name: row[nameCol] || "Name missing in sheet",
            classSec: row[classCol] || ""
          };
        }
      });
    }

    function processMarks(data) {
      const headers = data.table.cols.map(c => (c?.label || c?.id || "").trim()).filter(h => h);
      sheetRows = data.table.rows.map(r => r.c.map(cell => cell?.v ?? null));

      if (sheetRows.length === 0) throw new Error("Marks sheet is empty");
      
      detectExamBlocks(headers);
    }

    function detectExamBlocks(headers) {
      exams = [];
      let blockId = 0;

      // 1. Find the master EMIS/Exam No column (usually near the start)
      let emisCol = headers.findIndex(h => {
        const hLower = h.toLowerCase().replace(/[^a-z]/g, '');
        return hLower.includes("emis") || hLower.includes("examno") || hLower.includes("roll");
      });
      if (emisCol === -1) emisCol = 0; // Fallback

      // 2. We chunk exams dynamically. An exam block ENDS when we see a "Total" column.
      let currentBlock = {
        label: EXAM_NAMES[blockId] || `Exam ${blockId + 1}`,
        EXAMNOCol: emisCol,
        totalCol: null,
        resultCol: null,
        subjects: []
      };

      for (let c = 0; c < headers.length; c++) {
        const hLower = (headers[c] || "").toLowerCase().trim();
        const hAlpha = hLower.replace(/[^a-z]/g, '');

        // Skip static info columns
        if (["rank", "sno", "slno", "emis", "examno", "name", "class", "sec", "roll"].some(x => hAlpha.includes(x))) {
          continue;
        }

        // If it's a Total column, close this exam block and prepare the next one
        if (hLower.includes("total")) {
          currentBlock.totalCol = c;
          exams.push(currentBlock);
          blockId++;
          
          currentBlock = {
            label: EXAM_NAMES[blockId] || `Exam ${blockId + 1}`,
            EXAMNOCol: emisCol,
            totalCol: null,
            resultCol: null,
            subjects: []
          };
        } 
        // If it's a Result column (for your 9th std manual entry)
        else if (hLower === "result" || hLower.includes("status")) {
           if (exams.length > 0 && currentBlock.subjects.length === 0) {
              exams[exams.length - 1].resultCol = c; // Attach to previous block
           } else {
              currentBlock.resultCol = c;
           }
        }
        // Otherwise, it's a regular Subject
        else if (headers[c]) {
          currentBlock.subjects.push({ name: headers[c], col: c });
        }
      }

      // Catch any final subjects that didn't have a "Total" column after them
      if (currentBlock.subjects.length > 0) {
        exams.push(currentBlock);
      }

      if (exams.length === 0) {
        status.textContent = "No exams detected. Check your column headers.";
        examOptions.innerHTML = "No exams found";
        return;
      }

      renderExamCheckboxes();
      status.textContent = `Ready! Found ${exams.length} exam blocks.`;
    }

    function renderExamCheckboxes() {
      examOptions.innerHTML = "";
      exams.forEach((exam, idx) => {
        const lbl = document.createElement("label");
        lbl.className = "exam-pill";
        lbl.innerHTML = `<input type="checkbox" value="${idx}" checked> <span>${exam.label}</span>`;
        examOptions.appendChild(lbl);
      });
    }

    document.getElementById("showBtn").onclick = showResults;
    document.getElementById("examNoInput").addEventListener("keypress", e => {
      if (e.key === "Enter") showResults();
    });

    function extractClassNumber(clsString) {
      const str = String(clsString).toUpperCase();
      if (str.includes("9") || str.includes("IX")) return 9;
      if (str.includes("8") || str.includes("VIII")) return 8;
      if (str.includes("7") || str.includes("VII")) return 7;
      if (str.includes("6") || str.includes("VI")) return 6;
      return 0; 
    }

    function showResults() {
      const examNo = cleanID(document.getElementById("examNoInput").value);
      if (!examNo) {
        status.textContent = "Enter EMIS Number";
        return;
      }

      const selected = Array.from(examOptions.querySelectorAll("input:checked")).map(cb => parseInt(cb.value));

      if (selected.length === 0) {
        status.textContent = "Select at least one exam";
        return;
      }

      const results = [];
      
      selected.forEach(idx => {
        const exam = exams[idx];
        const row = sheetRows.find(r => r[exam.EXAMNOCol] != null && cleanID(r[exam.EXAMNOCol]) === examNo);

        if (row) {
          const marks = {};
          exam.subjects.forEach(s => { marks[s.name] = row[s.col] ?? "-"; });
          results.push({ 
            exam: exam.label, 
            total: exam.totalCol !== null ? (row[exam.totalCol] ?? "-") : "-", 
            manualResult: exam.resultCol !== null ? (row[exam.resultCol] ?? "") : "", 
            marks 
          });
        } else {
          results.push({ exam: exam.label, total: "-", manualResult: "", marks: {} });
        }
      });

      if (results.every(r => r.total === "-")) {
        status.textContent = "EMIS number not found in selected exams";
        document.getElementById("resultArea").style.display = "none";
        return;
      }

      renderTable(examNo, results);
      document.getElementById("resultArea").style.display = "block";
      status.textContent = "";
    }

    function renderTable(examno, results) {
      const studentData = studentInfoMap[examno] || { name: "Name not found in Sheet2", classSec: "—" };
      const classNum = extractClassNumber(studentData.classSec);
      const isRTE = (classNum >= 6 && classNum <= 8);
      
      const allSubjects = new Set();
      results.forEach(r => Object.keys(r.marks).forEach(s => allSubjects.add(s)));
      let subjects = Array.from(allSubjects);

      subjects.sort((a, b) => {
        const aIsTamil = a.toLowerCase().includes("tamil");
        const bIsTamil = b.toLowerCase().includes("tamil");
        if (aIsTamil && !bIsTamil) return -1;
        if (!aIsTamil && bIsTamil) return 1;
        return a.localeCompare(b);
      });

      let html = `<table><thead><tr><th>Subject</th>`;
      results.forEach(r => {
        html += `<th>${r.exam}</th>`;
        if (r.exam.toLowerCase().includes("annual")) html += `<th>Result</th>`; 
      });
      html += `</tr></thead><tbody>`;

      subjects.forEach(sub => {
        html += `<tr><td style="font-weight:600;">${sub}</td>`;
        results.forEach(r => {
          const mark = r.marks[sub] ?? "-";
          html += `<td>${mark}</td>`;
          if (r.exam.toLowerCase().includes("annual")) html += `<td>-</td>`; 
        });
        html += `</tr>`;
      });

      html += `<tr class="total-row"><td>TOTAL</td>`;
      results.forEach(r => {
        html += `<td>${r.total}</td>`;
        
        if (r.exam.toLowerCase().includes("annual")) {
          let finalStatus = "—";
          let statusClass = "result-pending";
          
          if (r.total !== "-") { 
            if (isRTE) {
              finalStatus = "PASS (RTE)";
              statusClass = "result-pass";
            } else {
              let manual = String(r.manualResult).toUpperCase().trim();
              if (manual.includes("PASS")) {
                 finalStatus = manual;
                 statusClass = "result-pass";
              } else if (manual.includes("DETAIN") || manual.includes("FAIL")) {
                 finalStatus = manual;
                 statusClass = "result-fail";
              } else if (manual && manual !== "NULL") {
                 finalStatus = manual; 
                 statusClass = "result-pass"; 
              }
            }
          }
          html += `<td class="${statusClass}">${finalStatus}</td>`;
        }
      });
      html += `</tr></tbody></table>`;

      document.getElementById("sName").textContent = studentData.name;
      document.getElementById("sEXAMNO").textContent = examno;
      document.getElementById("sClass").textContent = studentData.classSec;
      document.getElementById("examLabels").textContent = `(${results.map(r => r.exam).join(" / ")})`;
      document.getElementById("tableWrapper").innerHTML = html;
    }

    loadData();
  </script>
</body>
</html>
